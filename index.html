          h('div', {style:{fontWeight:900,fontSize:16,marginBottom:4,color:"#1C2B1A"}}, "📱 Scan QRIS untuk Membayar"),
          h('div', {style:{fontSize:13,color:"#888",marginBottom:16}}, "Buka aplikasi e-wallet atau m-banking → Scan QR"),
          h('img', {src:QRIS_B64, alt:"QRIS", style:{width:"100%",maxWidth:280,borderRadius:12,border:"2px solid #E0E0E0",display:"block",margin:"0 auto"}}),
          h('div', {style:{marginTop:14,background:"#FFF8E1",borderRadius:12,padding:"12px",fontSize:13,color:"#795548"}},
            h('b', null, "HARVEST MOON JAKARTA"), h('br'), "NMID: ID1022217107252")
        ),
        payMethod==="transfer" && h('div', {style:{background:"#fff",borderRadius:16,padding:"20px",marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,.06)"}},
          h('div', {style:{fontWeight:900,fontSize:16,marginBottom:16,color:"#1C2B1A"}}, "🏦 Transfer Bank BCA"),
          h('div', {style:{background:"#E3F2FD",borderRadius:14,padding:"16px",textAlign:"center",marginBottom:12}},
            h('div', {style:{fontSize:12,color:"#888",marginBottom:4}}, "No. Rekening"),
            h('div', {style:{fontSize:24,fontWeight:900,color:"#1565C0",letterSpacing:2}}, "1830 998 108"),
            h('div', {style:{fontSize:13,color:"#555",marginTop:4}}, "a/n ", h('b', null, "Steffi Natalie"))
          ),
          h('div', {style:{display:"flex",justifyContent:"space-between",background:"#F5F5F0",borderRadius:12,padding:"12px 14px"}},
            h('span', {style:{fontSize:13,color:"#666"}}, "Jumlah transfer"),
            h('span', {style:{fontWeight:900,fontSize:15,color:"#1C2B1A"}}, fmt(cartTotal))
          )
        ),
        h('div', {style:{background:"#E8F5E9",borderRadius:16,padding:"16px",marginBottom:20}},
          h('div', {style:{fontWeight:800,fontSize:13,color:"#2E7D32",marginBottom:10}}, "📌 Langkah selanjutnya"),
          ...[
            {n:"1",t:"Kirim pesanan via WhatsApp",s:"Klik tombol di bawah — detail order terkirim ke CS kami"},
            {n:"2",t:"CS konfirmasi stok & total",s:"Tim kami cek ketersediaan dan konfirmasi ke WA kamu"},
            {n:"3",t:"Lakukan pembayaran",s:`Setelah dikonfirmasi, bayar via ${payMethod==="qris"?"QRIS di atas":"transfer BCA di atas"}`},
            {n:"4",t:"Kirim bukti bayar",s:"Screenshot bukti bayar ke CS kami"},
            {n:"5",t:"Pesanan diproses & dikirim",s:"Fresh, atau uang kembali! 🌙"},
          ].map(s => h('div', {key:s.n, style:{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}},
            h('span', {style:{background:"#2E7D32",color:"#fff",borderRadius:50,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0}}, s.n),
            h('div', null,
              h('div', {style:{fontWeight:800,fontSize:13,color:"#1C2B1A"}}, s.t),
              h('div', {style:{fontSize:12,color:"#666"}}, s.s)
            )
          ))
        ),
        h('button', {onClick:onSend, style:{width:"100%",background:"linear-gradient(135deg,#25D366,#128C7E)",color:"#fff",padding:"17px",borderRadius:16,border:"none",fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer",boxShadow:"0 4px 20px rgba(37,211,102,.4)"}},
          h('svg', {width:22,height:22,viewBox:"0 0 24 24",fill:"white"},
            h('path', {d:"M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"}),
            h('path', {d:"M12 0C5.373 0 0 5.373 0 12c0 2.117.554 4.103 1.523 5.826L0 24l6.335-1.503A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.003-1.367l-.357-.213-3.757.891.946-3.654-.234-.374A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"})
          ),
          "Kirim Pesanan via WhatsApp"
        ),
        h('div', {style:{textAlign:"center",fontSize:12,color:"#aaa",marginTop:10}}, "WA CS buka Senin–Sabtu 07.00–17.00, Minggu 09.00–17.00")
      )
    );
  }

  // ─── MAIN APP ─────────────────────────────────────────────────────────────
  function App() {
    const [cart, setCart] = useState({});
    const [activeCategory, setActiveCategory] = useState("sayuran");
    const [search, setSearch] = useState("");
    const [showInfo, setShowInfo] = useState(false);
    const [step, setStep] = useState("shop");
    const [form, setForm] = useState({nama:"",wa:"",alamat:""});
    const [formErr, setFormErr] = useState({});
    const [payMethod, setPayMethod] = useState("qris");
    const { isOpen } = getStoreStatus();

    const addToCart = (p) => setCart(prev => ({...prev,[p.id]:{...p,qty:(prev[p.id]?.qty||0)+1}}));
    const removeFromCart = (id) => setCart(prev => {
      const n={...prev};
      if(n[id].qty<=1) delete n[id]; else n[id]={...n[id],qty:n[id].qty-1};
      return n;
    });

    const cartItems = Object.values(cart);
    const cartCount = cartItems.reduce((s,i)=>s+i.qty,0);
    const cartTotal = cartItems.reduce((s,i)=>s+i.price*i.qty,0);
    const col = CAT_CONFIG[activeCategory]||CAT_CONFIG.sayuran;

    const searchResults = useMemo(()=>
      search.length>1 ? PRODUCTS.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())).map(p=>({...p,catColor:CAT_CONFIG[p.kategori]||CAT_CONFIG.sayuran})) : []
    ,[search]);
    const displayProducts = search.length>1 ? searchResults : PRODUCTS.filter(p=>p.kategori===activeCategory);

    const goCheckout = () => { setStep("checkout"); window.scrollTo(0,0); };

    const goPayment = () => {
      const err={};
      if(!form.nama.trim()) err.nama="Nama wajib diisi";
      if(!form.wa.trim()) err.wa="Nomor WA wajib diisi";
      if(!form.alamat.trim()) err.alamat="Alamat kirim wajib diisi";
      if(Object.keys(err).length){setFormErr(err);return;}
      setFormErr({});setStep("payment");window.scrollTo(0,0);
    };

    const sendOrder = () => {
      const ri=cartItems.filter(i=>i.ready), pi=cartItems.filter(i=>!i.ready);
      const payLabel=payMethod==="qris"?"QRIS":"Transfer BCA (1830 998 108 a/n Steffi Natalie)";
      let msg=`Halo Harvest Moon Jakarta! 🌙 Ada pesanan baru:\n\n`;
      msg+=`👤 *${form.nama}*\n📱 WA: ${form.wa}\n📍 Alamat: ${form.alamat}\n\n`;
      if(ri.length){msg+="*✅ READY STOCK:*\n";msg+=ri.map(i=>`  • ${i.qty}x ${i.name}${i.star?" (min 250gr)":""} (${i.unit}) — ${fmt(i.price*i.qty)}`).join("\n")+"\n\n";}
      if(pi.length){msg+="*📦 PRE ORDER (H+1):*\n";msg+=pi.map(i=>`  • ${i.qty}x ${i.name}${i.star?" (min 250gr)":""} (${i.unit}) — ${fmt(i.price*i.qty)}`).join("\n")+"\n\n";}
      msg+=`*TOTAL: ${fmt(cartTotal)}*\n`;
      msg+=`💳 Pembayaran: ${payLabel}\n\n`;
      msg+=`Mohon konfirmasi ketersediaan barang ya! 🙏`;
      window.open(`https://wa.me/6287878483586?text=${encodeURIComponent(msg)}`,"_blank");
    };

    if(step==="checkout") return h(Checkout,{cartItems,cartTotal,cartCount,form,setForm,formErr,payMethod,setPayMethod,onBack:()=>setStep("shop"),onNext:goPayment,fmt});
    if(step==="payment") return h(Payment,{cartItems,cartTotal,cartCount,form,payMethod,onBack:()=>setStep("checkout"),onSend:sendOrder,fmt});

    // SHOP
    return h('div', {style:{fontFamily:"'Nunito',sans-serif",minHeight:"100vh",background:"#F7F8F3"}},
      // Header
      h('header', {style:{background:"#0F1A0E",padding:"0 12px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",gap:10,height:60}},
        h('img', {src:LOGO_B64, alt:"logo", style:{width:44,height:44,objectFit:"contain",borderRadius:8,flexShrink:0}}),
        h('div', {style:{flex:1,minWidth:0}},
          h('div', {style:{display:"flex",alignItems:"center",gap:7}},
            h('span', {style:{fontWeight:900,fontSize:15,color:"#fff",whiteSpace:"nowrap"}}, "Harvest Moon Jakarta"),
            h('span', {style:{background:isOpen?"#2E7D32":"#B71C1C",color:"#fff",fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:7}}, isOpen?"🟢 BUKA":"🔴 TUTUP")
          ),
          h('div', {style:{fontSize:10,color:"#81C784"}}, `Fresh atau Uang Kembali · ${PRODUCTS.length} Produk`)
        ),
        h('button', {className:"btn", onClick:()=>setShowInfo(true), style:{background:"rgba(255,255,255,.13)",borderRadius:50,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}, "ℹ️"),
        cartCount>0 && h('button', {className:"btn", onClick:goCheckout, style:{background:"#43A047",borderRadius:50,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",flexShrink:0}},
          h('span', {style:{fontSize:20}}, "🛒"),
          h('span', {style:{position:"absolute",top:-3,right:-3,background:"#FF5722",color:"#fff",borderRadius:50,width:19,height:19,fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}, cartCount)
        )
      ),
      // Search
      h('div', {style:{background:"#fff",padding:"10px 12px",borderBottom:"1px solid #EEF0E8"}},
        h('input', {value:search, onChange:e=>setSearch(e.target.value),
          placeholder:`🔍  Cari dari ${PRODUCTS.length} produk...`,
          style:{width:"100%",background:"#F5F5F0",border:"none",borderRadius:20,padding:"9px 16px",color:"#333",fontSize:13,fontFamily:"'Nunito',sans-serif",fontWeight:600}})
      ),
      // Legend
      h('div', {style:{background:"#fff",padding:"6px 12px 8px",borderBottom:"1px solid #EEF0E8",display:"flex",gap:12,alignItems:"center",fontSize:11,flexWrap:"wrap"}},
        h('span', {style:{fontWeight:700,color:"#555"}}, "Stok:"),
        h('span', {style:{display:"flex",alignItems:"center",gap:4}},
          h('span', {style:{width:12,height:12,borderRadius:3,background:"#C8E6C9",border:"2px solid #43A047",display:"inline-block"}}),
          h('b', {style:{color:"#2E7D32"}}, "Warna"), " = ⚡ Ready"),
        h('span', {style:{display:"flex",alignItems:"center",gap:4}},
          h('span', {style:{width:12,height:12,borderRadius:3,background:"#fff",border:"2px solid #ccc",display:"inline-block"}}),
          h('b', {style:{color:"#777"}}, "Putih"), " = 📦 PO H+1"),
        h('span', {style:{display:"flex",alignItems:"center",gap:4}},
          h('span', {className:"bp", style:{background:"#37474F"}}, "✂"), " = bisa 250gr")
      ),
      // Category tabs
      h('div', {style:{background:"#fff",borderBottom:"1px solid #EEF0E8",padding:"9px 12px",display:"flex",gap:7,overflowX:"auto"}},
        ...CAT_ORDER.map(id => {
          const cfg=CAT_CONFIG[id];
          const count=PRODUCTS.filter(p=>p.kategori===id).length;
          if(!count) return null;
          const active=id===activeCategory&&!search;
          return h('button', {key:id, className:"cat", onClick:()=>{setActiveCategory(id);setSearch("");},
            style:{background:active?cfg.btn:"#F5F5F0",color:active?"#fff":"#555",padding:"6px 13px",borderRadius:20,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,whiteSpace:"nowrap",boxShadow:active?`0 3px 10px ${cfg.btn}66`:"none"}},
            `${cfg.emoji} ${cfg.label} `, h('span', {style:{opacity:.7,fontSize:10}}, `(${count})`)
          );
        })
      ),
      // Products grid
      h('div', {style:{padding:"12px 10px 96px"}},
        search.length>1 && h('div', {style:{marginBottom:10,fontWeight:800,color:"#555",fontSize:13}}, `"${search}" — ${searchResults.length} produk`),
        !displayProducts.length && h('div', {style:{textAlign:"center",padding:"48px 0",color:"#bbb"}},
          h('div', {style:{fontSize:40}}, "🔍"),
          h('div', {style:{fontWeight:700,marginTop:8}}, "Tidak ditemukan")
        ),
        h('div', {style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:11}},
          ...displayProducts.map(p => {
            const c=search.length>1?(p.catColor||col):col;
            const inCart=cart[p.id];
            return h('div', {key:p.id, className:"hov", style:{borderRadius:18,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,.07)",border:inCart?`2.5px solid ${c.accent}`:p.ready?`2px solid ${c.btn}99`:"2px solid #E5E5E5",background:p.ready?c.bg:"#fff"}},
              h('div', {style:{height:120,overflow:"hidden",position:"relative",background:p.ready?c.bg:"#F0F0F0"}},
                h('img', {className:"pimg", src:p.photo, alt:p.name, style:{width:"100%",height:"100%",objectFit:"cover"}}),
                h('div', {style:{position:"absolute",top:6,left:6,display:"flex",flexDirection:"column",gap:3}},
                  h('span', {className:"bp", style:{background:p.ready?"#1B5E20":"#555"}}, p.ready?"⚡ READY":"📦 PO H+1"),
                  p.star && h('span', {className:"bp", style:{background:"#37474F"}}, "✂ min 250gr")
                )
              ),
              h('div', {style:{padding:"9px 11px 11px",background:p.ready?c.bg:"#fff"}},
                h('div', {style:{fontWeight:800,fontSize:13,color:"#1C2B1A",lineHeight:1.25,marginBottom:4}}, p.name),
                h('div', {style:{fontWeight:900,fontSize:14,color:c.accent}},
                  fmt(p.price), h('span', {style:{fontSize:10,color:"#aaa",fontWeight:600}}, "/"+p.unit)
                ),
                h('div', {style:{marginTop:8}},
                  !inCart
                    ? h('button', {className:"btn", onClick:()=>addToCart(p), style:{width:"100%",background:p.ready?c.btn:"#757575",color:"#fff",padding:"7px 0",borderRadius:10,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:13}}, "+ Tambah")
                    : h('div', {style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:p.ready?c.bg:"#F0F0F0",borderRadius:10,padding:"3px 6px"}},
                        h('button', {className:"btn", onClick:()=>removeFromCart(p.id), style:{width:26,height:26,background:p.ready?c.accent:"#555",color:"#fff",borderRadius:7,fontWeight:900,fontSize:15}}, "−"),
                        h('span', {style:{fontWeight:900,color:p.ready?c.accent:"#555"}}, inCart.qty),
                        h('button', {className:"btn", onClick:()=>addToCart(p), style:{width:26,height:26,background:p.ready?c.accent:"#555",color:"#fff",borderRadius:7,fontWeight:900,fontSize:15}}, "+")
                      )
                )
              )
            );
          })
        )
      ),
      // FAB
      cartCount>0 && h('div', {className:"fab", onClick:goCheckout},
        h('div', {style:{display:"flex",alignItems:"center",gap:9}},
          h('span', {style:{background:"#43A047",borderRadius:10,padding:"3px 10px",fontWeight:900,fontSize:13}}, cartCount+" item"),
          h('span', {style:{color:"#ccc",fontSize:13,fontWeight:600}}, "Lanjut Checkout")
        ),
        h('span', {style:{fontWeight:900,fontSize:15,color:"#CDDC39"}}, fmt(cartTotal)+" →")
      ),
      // Info Modal
      showInfo && h('div', {className:"mov", onClick:()=>setShowInfo(false)},
        h('div', {className:"mod", onClick:e=>e.stopPropagation()},
          h('div', {style:{display:"flex",alignItems:"center",gap:12,marginBottom:16}},
            h('img', {src:LOGO_B64, alt:"logo", style:{width:48,height:48,objectFit:"contain",borderRadius:10}}),
            h('div', null,
              h('div', {style:{fontWeight:900,fontSize:17}}, "Harvest Moon Jakarta"),
              h('div', {style:{fontSize:11,color:"#888"}}, "Fresh, Atau Uang Kembali")
            )
          ),
          h('div', {style:{background:"#F5F5F0",borderRadius:14,padding:"14px",marginBottom:10}},
            h('div', {style:{fontWeight:800,fontSize:13,marginBottom:9}}, "🕐 Jam Operasional"),
            h('div', {style:{display:"flex",justifyContent:"space-between",marginBottom:5}},
              h('span', {style:{color:"#555",fontSize:13}}, "Senin – Sabtu"), h('b', null, "07.00 – 17.00")),
            h('div', {style:{display:"flex",justifyContent:"space-between"}},
              h('span', {style:{color:"#555",fontSize:13}}, "Minggu"), h('b', null, "09.00 – 17.00")),
            h('div', {style:{marginTop:9,padding:"7px 12px",background:isOpen?"#E8F5E9":"#FFEBEE",borderRadius:10,textAlign:"center",fontWeight:800,fontSize:12,color:isOpen?"#2E7D32":"#B71C1C"}},
              isOpen?"🟢 Toko sedang BUKA":"🔴 Toko sedang TUTUP")
          ),
          h('div', {style:{background:"#FFF8E1",borderRadius:14,padding:"14px",marginBottom:10}},
            h('div', {style:{fontWeight:800,fontSize:13,marginBottom:8}}, "📦 Info Order"),
            h('div', {style:{fontSize:12,color:"#555",lineHeight:1.7}},
              "• Min order ", h('b',null,"500gr"), ", kecuali produk ✂ bisa 250gr", h('br'),
              "• Max order PO jam ", h('b',null,"15:00"), " untuk kirim H+1", h('br'),
              "• Card berwarna = Ready Stock ⚡", h('br'),
              "• Card putih = PO H+1 📦"
            )
          ),
          h('div', {style:{background:"#E8F5E9",borderRadius:14,padding:"14px",marginBottom:14}},
            h('div', {style:{fontWeight:800,fontSize:13,marginBottom:6}}, "📍 Lokasi"),
            h('div', {style:{fontSize:12,color:"#555",lineHeight:1.6}}, "Jl. Pulau Laki Raya N5 No. 3", h('br'), "Kembangan, Jakarta Barat"),
            h('a', {href:"https://maps.google.com/?q=Harvest+Moon+Jakarta+Kembangan", target:"_blank", rel:"noreferrer",
              style:{display:"inline-block",marginTop:8,background:"#2E7D32",color:"#fff",fontSize:12,fontWeight:800,padding:"6px 14px",borderRadius:10,textDecoration:"none"}},
              "🗺️ Google Maps")
          ),
          h('button', {onClick:()=>setShowInfo(false), style:{width:"100%",background:"#1C2B1A",color:"#fff",border:"none",padding:"13px",borderRadius:14,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer"}},
            "Tutup")
        )
      )
    );
  }

  // Mount
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
